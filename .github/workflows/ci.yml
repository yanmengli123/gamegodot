name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6.3
  GODOT_BIN: godot

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: godot-bin
          key: godot-${{ env.GODOT_VERSION }}-stable

      - name: Install Godot ${{ env.GODOT_VERSION }}
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p godot-bin
          cd godot-bin
          wget -q "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot
          chmod +x godot
          ls -la

      - name: Set up Godot CLI
        run: |
          echo "$GITHUB_WORKSPACE/godot-bin" >> $GITHUB_PATH
          ./godot-bin/godot --version

      - name: Import Project
        run: |
          cd demo
          ../godot-bin/godot --headless --import 2>&1 | tail -20

      - name: Run Tests
        run: |
          cd demo
          ../godot-bin/godot --headless 2>&1 | tee /tmp/test_output.log
          if grep -q "总结果.*0 失败" /tmp/test_output.log; then
            echo "✅ All tests passed"
          else
            echo "❌ Tests failed"
            cat /tmp/test_output.log
            exit 1
          fi

      - name: Run Extended Tests
        run: |
          cd demo
          ../godot-bin/godot --headless 2>&1 | tee /tmp/test_ext_output.log
          if grep -q "总结果.*0 失败" /tmp/test_ext_output.log; then
            echo "✅ Extended tests passed"
          else
            cat /tmp/test_ext_output.log
            exit 1
          fi

      - name: Smoke Test (Headless)
        run: |
          cd demo
          ../godot-bin/godot --quit-after 60 2>&1 | tail -10

  build:
    name: Export Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        uses: actions/cache@v4
        with:
          path: godot-bin
          key: godot-${{ env.GODOT_VERSION }}-stable

      - name: Install Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p godot-bin
          cd godot-bin
          wget -q "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot
          chmod +x godot

      - name: Import
        run: cd demo && ../godot-bin/godot --headless --import

      - name: Build Linux x86_64
        run: |
          cd demo
          ../godot-bin/godot --headless --export-release "Linux/X11" ../build/fate-gear.x86_64 || echo "Export preset not configured (expected in dev)"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fate-gear-linux
          path: build/
          if-no-files-found: ignore

  lint:
    name: Lint GDScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        uses: actions/cache@v4
        with:
          path: godot-bin
          key: godot-${{ env.GODOT_VERSION }}-stable

      - name: Install Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p godot-bin
          cd godot-bin
          wget -q "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot
          chmod +x godot

      - name: Check syntax (headless import)
        run: |
          cd demo
          ../godot-bin/godot --headless --check-only --script core/tests/test_runner.gd || true
          ../godot-bin/godot --headless --import 2>&1 | tail -5
